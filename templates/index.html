<!-- templates/index.html -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>图灵知识图谱可视化系统</title>
    <!-- 引入百度 ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f6f9; font-family: 'Microsoft YaHei'; }
        #header { text-align: center; padding: 20px; background-color: #2c3e50; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #main { width: 100vw; height: calc(100vh - 80px); }
    </style>
</head>
<body>
    <div id="header">
        <h2>🔬 2026知识工程 - 动态知识图谱可视化引擎</h2>
    </div>
    <div id="main"></div>

    <script type="text/javascript">
        var myChart = echarts.init(document.getElementById('main'));
        
        myChart.showLoading();
        // 请求我们写的 Python 后端接口
        fetch('/api/graph')
            .then(response => response.json())
            .then(graph => {
                myChart.hideLoading();
                
                var option = {
                    tooltip: { formatter: '{b}' },
                    legend: { data: graph.categories.map(a => a.name) },
                    series: [
                        {
                            type: 'graph',
                            layout: 'force',    // 力导向图布局
                            data: graph.nodes,
                            links: graph.links,
                            categories: graph.categories,
                            roam: true,         // 允许拖拽和缩放
                            label: {
                                show: true,
                                position: 'right',
                                formatter: '{b}'
                            },
                            edgeSymbol: ['circle', 'arrow'], // 箭头
                            edgeSymbolSize: [4, 10],
                            edgeLabel: {
                                show: true,
                                formatter: "{c}",
                                fontSize: 12
                            },
                            force: {
                                repulsion: 500,  // 节点互斥力大小
                                edgeLength: 150  // 连线长度
                            },
                            lineStyle: {
                                color: 'source',
                                curveness: 0.2   // 线条弯曲度
                            }
                        }
                    ]
                };
                myChart.setOption(option);
            });
    </script>
</body>
</html>
